<svg viewBox="0 0 1000 1580" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
<style>
  .s{fill:none;stroke:#141414;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;
     stroke-dasharray:100;stroke-dashoffset:100;animation:draw 1.4s cubic-bezier(.6,0,.2,1) var(--d,0s) forwards}
  .s.t5{stroke-width:5}.s.thin{stroke-width:3;stroke-opacity:.55}
  .n{fill:#141414;transform-box:fill-box;transform-origin:center;transform:scale(0);
     animation:bleed .55s ease var(--d,0s) forwards}
  .halo{fill:#141414;fill-opacity:.10;transform-box:fill-box;transform-origin:center}
  .pulse{animation:pulse 3.2s ease-in-out infinite}
  .lbl{fill:#141414;font-size:14px}.cap{fill:#7A7872;font-size:12px}
  .sec{fill:#7A7872;font-size:13px;font-family:'DM Mono',ui-monospace,monospace;letter-spacing:3px}
  .h1{fill:#141414;font-size:30px;font-style:italic}
  .badge{fill:#7A7872;font-size:9px;font-family:'DM Mono',ui-monospace,monospace;letter-spacing:1.5px}
  .frame{fill:none;stroke:#141414;stroke-opacity:.15}
  .frame.new{stroke-opacity:.32;stroke-dasharray:3 3}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes bleed{to{transform:scale(1)}}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.10}50%{transform:scale(1.6);opacity:.04}}
  @keyframes travel{to{offset-distance:100%}}
  .traveller{fill:#141414;offset-path:path('M40 1130 L160 1170 L280 1130 L400 1170 L520 1130 L640 1170 L760 1130 L880 1170 L960 1134');animation:travel 5.5s cubic-bezier(.45,0,.55,1) 1.6s infinite}
</style>

  <rect x="0" y="0" width="1000" height="1580" fill="#F4F1EB"/>
  <rect x="16" y="16" width="968" height="1548" class="frame"/>

  <!-- HEADER -->
  <text x="50" y="62" class="h1">W4GZ — Symbol System v2</text>
  <text x="50" y="86" class="sec">ONE LINE · MANY NODES · NARRATIVE × WRITING × COMMUNITY</text>
  <line x1="50" y1="104" x2="950" y2="104" stroke="#141414" stroke-opacity=".2"/>

  <!-- ATOMS -->
  <text x="50" y="150" class="sec">ATOMS</text>
  <path class="s" pathLength="100" style="--d:.1s" d="M250,210 L380,165"/>
  <circle class="n" style="--d:.7s" cx="250" cy="210" r="3"/>
  <text x="250" y="250" class="lbl">The Stroke</text>
  <text x="250" y="270" class="cap">= narrative · a line that enters and exits; the story continues past the frame</text>
  <circle class="halo pulse" cx="660" cy="188" r="22"/>
  <circle class="n" style="--d:.5s" cx="660" cy="188" r="10"/>
  <text x="700" y="184" class="lbl">The Node</text>
  <text x="700" y="204" class="cap">= community · where strokes meet; also the ink (click interaction)</text>
  <line x1="50" y1="300" x2="950" y2="300" stroke="#141414" stroke-opacity=".12"/>

  <!-- SPINE -->
  <text x="50" y="338" class="sec">THE SPINE — Narrative × Writing × Community  ·  all three now carry a glyph</text>

  <!-- NARRATIVE (NEW) — the threading line; a weave in miniature -->
  <g transform="translate(125,372)">
    <rect x="0" y="0" width="120" height="120" class="frame new"/>
    <path class="s" pathLength="100" style="--d:.30s" d="M-4,74 C26,40 44,40 60,62 S96,86 124,48"/>
    <circle class="n" style="--d:1.0s" cx="60" cy="62" r="6"/>
    <circle class="n" style="--d:1.15s" cx="96" cy="63" r="6"/>
  </g>
  <text x="185" y="530" class="lbl" text-anchor="middle">Narrative</text>
  <text x="185" y="548" class="badge" text-anchor="middle">+ NEW</text>

  <!-- WRITING -->
  <g transform="translate(440,372)">
    <rect x="0" y="0" width="120" height="120" class="frame"/>
    <path class="s" pathLength="100" style="--d:.45s" d="M40,22 C50,48 56,72 66,94"/>
    <path class="s thin" pathLength="100" style="--d:.7s" d="M34,104 L92,104"/>
    <circle class="n" style="--d:1.05s" cx="66" cy="94" r="6"/>
  </g>
  <text x="500" y="530" class="lbl" text-anchor="middle">Writing</text>

  <!-- COMMUNITY -->
  <g transform="translate(755,372)">
    <rect x="0" y="0" width="120" height="120" class="frame"/>
    <path class="s" pathLength="100" style="--d:.5s" d="M22,28 L60,60"/>
    <path class="s" pathLength="100" style="--d:.55s" d="M98,30 L60,60"/>
    <path class="s" pathLength="100" style="--d:.6s" d="M24,96 L60,60"/>
    <path class="s" pathLength="100" style="--d:.65s" d="M96,94 L60,60"/>
    <path class="s" pathLength="100" style="--d:.7s" d="M60,18 L60,60"/>
    <circle class="n" style="--d:1.2s" cx="60" cy="60" r="7"/>
  </g>
  <text x="815" y="530" class="lbl" text-anchor="middle">Community</text>
  <line x1="50" y1="572" x2="950" y2="572" stroke="#141414" stroke-opacity=".12"/>

  <!-- PAGE MODULES -->
  <text x="50" y="610" class="sec">PAGE MODULES — one per page  ·  dashed frame = new</text>

  <!-- row1: Home(new) · The Fit(new) · Courses(new) · Ecosystem -->
  <g transform="translate(80,645)">
    <rect x="0" y="0" width="120" height="120" class="frame new"/>
    <path class="s t5" pathLength="100" style="--d:.7s" d="M28,104 L28,52 Q60,20 92,52 L92,104"/>
    <circle class="n" style="--d:1.4s" cx="60" cy="34" r="6"/>
  </g>
  <text x="140" y="803" class="lbl" text-anchor="middle">Home</text>
  <text x="140" y="821" class="badge" text-anchor="middle">+ NEW</text>

  <g transform="translate(295,645)">
    <rect x="0" y="0" width="120" height="120" class="frame new"/>
    <path class="s t5" pathLength="100" style="--d:.8s" d="M84,33 A37,37 0 1 1 84,87"/>
    <circle class="n" style="--d:1.5s" cx="60" cy="60" r="7"/>
  </g>
  <text x="355" y="803" class="lbl" text-anchor="middle">The Fit</text>
  <text x="355" y="821" class="badge" text-anchor="middle">+ NEW</text>

  <g transform="translate(510,645)">
    <rect x="0" y="0" width="120" height="120" class="frame new"/>
    <path class="s t5" pathLength="100" style="--d:.9s" d="M22,98 L46,98 L46,74 L70,74 L70,50 L94,50"/>
    <circle class="n" style="--d:1.55s" cx="46" cy="74" r="5"/>
    <circle class="n" style="--d:1.65s" cx="70" cy="50" r="5"/>
    <circle class="n" style="--d:1.75s" cx="94" cy="50" r="5"/>
  </g>
  <text x="570" y="803" class="lbl" text-anchor="middle">Courses</text>
  <text x="570" y="821" class="badge" text-anchor="middle">+ NEW</text>

  <g transform="translate(725,645)">
    <rect x="0" y="0" width="120" height="120" class="frame"/>
    <path class="s t5" pathLength="100" style="--d:1.0s" d="M60,104 L60,58"/>
    <path class="s t5" pathLength="100" style="--d:1.05s" d="M60,58 L34,26"/>
    <path class="s t5" pathLength="100" style="--d:1.1s" d="M60,58 L60,22"/>
    <path class="s t5" pathLength="100" style="--d:1.15s" d="M60,58 L86,28"/>
    <circle class="n" style="--d:1.7s" cx="60" cy="58" r="6"/>
  </g>
  <text x="785" y="803" class="lbl" text-anchor="middle">Ecosystem</text>

  <!-- row2: People · Join(new) · Hub · Media Team -->
  <g transform="translate(80,835)">
    <rect x="0" y="0" width="120" height="120" class="frame"/>
    <path class="s t5" pathLength="100" style="--d:1.05s" d="M22,94 L98,94"/>
    <path class="s t5" pathLength="100" style="--d:1.1s" d="M34,94 L34,56"/>
    <path class="s t5" pathLength="100" style="--d:1.13s" d="M48,94 L48,42"/>
    <path class="s t5" pathLength="100" style="--d:1.16s" d="M62,94 L62,62"/>
    <path class="s t5" pathLength="100" style="--d:1.19s" d="M76,94 L76,46"/>
    <path class="s t5" pathLength="100" style="--d:1.22s" d="M88,94 L88,58"/>
    <circle class="n" style="--d:1.8s" cx="34" cy="56" r="5"/><circle class="n" style="--d:1.83s" cx="48" cy="42" r="5"/>
    <circle class="n" style="--d:1.86s" cx="62" cy="62" r="5"/><circle class="n" style="--d:1.89s" cx="76" cy="46" r="5"/>
    <circle class="n" style="--d:1.92s" cx="88" cy="58" r="5"/>
  </g>
  <text x="140" y="993" class="lbl" text-anchor="middle">People</text>

  <g transform="translate(295,835)">
    <rect x="0" y="0" width="120" height="120" class="frame new"/>
    <path class="s t5" pathLength="100" style="--d:1.15s" d="M20,38 L58,62"/>
    <path class="s t5" pathLength="100" style="--d:1.2s" d="M20,86 L58,62"/>
    <path class="s t5" pathLength="100" style="--d:1.3s" d="M58,62 L116,62"/>
    <circle class="n" style="--d:1.95s" cx="58" cy="62" r="7"/>
  </g>
  <text x="355" y="993" class="lbl" text-anchor="middle">Join</text>
  <text x="355" y="1011" class="badge" text-anchor="middle">+ NEW</text>

  <g transform="translate(510,835)">
    <rect x="0" y="0" width="120" height="120" class="frame"/>
    <path class="s t5" pathLength="100" style="--d:1.2s" d="M30,30 L90,30"/>
    <path class="s t5" pathLength="100" style="--d:1.24s" d="M30,30 L30,90"/>
    <path class="s t5" pathLength="100" style="--d:1.28s" d="M30,90 L62,90"/>
    <path class="s t5" pathLength="100" style="--d:1.32s" d="M90,30 L90,62"/>
    <path class="s t5" pathLength="100" style="--d:1.36s" d="M62,60 L44,44"/>
    <path class="s t5" pathLength="100" style="--d:1.4s" d="M62,60 L80,44"/>
    <path class="s t5" pathLength="100" style="--d:1.44s" d="M62,60 L52,78"/>
    <circle class="n" style="--d:2.0s" cx="62" cy="60" r="6"/>
  </g>
  <text x="570" y="993" class="lbl" text-anchor="middle">Hub</text>

  <g transform="translate(725,835)">
    <rect x="0" y="0" width="120" height="120" class="frame"/>
    <path class="s t5" pathLength="100" style="--d:1.3s" d="M40,42 A18,18 0 0 1 40,78"/>
    <path class="s t5" pathLength="100" style="--d:1.36s" d="M40,30 A30,30 0 0 1 40,90"/>
    <path class="s t5" pathLength="100" style="--d:1.42s" d="M40,18 A42,42 0 0 1 40,102"/>
    <path class="s t5" pathLength="100" style="--d:1.48s" d="M40,60 L22,60"/>
    <circle class="n" style="--d:2.05s" cx="40" cy="60" r="6"/>
  </g>
  <text x="785" y="993" class="lbl" text-anchor="middle">Media Team</text>
  <line x1="50" y1="1030" x2="950" y2="1030" stroke="#141414" stroke-opacity=".12"/>

  <!-- THE WEAVE (the "wave") -->
  <text x="50" y="1068" class="sec">THE WEAVE ("wave") — the connective principle  ·  a node travels the line, endlessly</text>
  <path class="s t5" pathLength="100" style="--d:1.2s" d="M40,1130 L160,1170 L280,1130 L400,1170 L520,1130 L640,1170 L760,1130 L880,1170 L960,1134"/>
  <g>
    <circle class="n" style="--d:1.95s" cx="160" cy="1170" r="6"/><circle class="n" style="--d:2.0s" cx="280" cy="1130" r="6"/>
    <circle class="n" style="--d:2.05s" cx="400" cy="1170" r="6"/><circle class="n" style="--d:2.1s" cx="520" cy="1130" r="6"/>
    <circle class="n" style="--d:2.15s" cx="640" cy="1170" r="6"/><circle class="n" style="--d:2.2s" cx="760" cy="1130" r="6"/>
    <circle class="n" style="--d:2.25s" cx="880" cy="1170" r="6"/>
  </g>
  <circle class="traveller" r="7"/>
  <text x="50" y="1216" class="cap">One line threading many nodes: a single narrative binding a community. It exits both edges — never ends, tiles infinitely. This is the motif used on the Power of Narrative page and under the motto.</text>
  <line x1="50" y1="1244" x2="950" y2="1244" stroke="#141414" stroke-opacity=".12"/>

  <!-- MASTER MARK -->
  <text x="50" y="1282" class="sec">MASTER MARK</text>
  <path class="s" pathLength="100" style="--d:1.4s;stroke-width:7" d="M360,1330 L410,1420 L460,1355 L510,1420 L560,1330"/>
  <path class="s thin" pathLength="100" style="--d:1.75s;stroke-width:4;stroke-opacity:.7" d="M560,1330 L598,1362"/>
  <path class="s thin" pathLength="100" style="--d:1.85s;stroke-width:4;stroke-opacity:.7" d="M636,1332 L700,1286"/>
  <path class="s thin" pathLength="100" style="--d:1.95s;stroke-width:3;stroke-opacity:.7" d="M700,1286 l-9,1 m9,-1 l-2,9"/>
  <g>
    <circle class="n" style="--d:2.1s" cx="360" cy="1330" r="6"/><circle class="n" style="--d:2.14s" cx="410" cy="1420" r="6"/>
    <circle class="n" style="--d:2.18s" cx="460" cy="1355" r="6"/><circle class="n" style="--d:2.22s" cx="510" cy="1420" r="6"/>
    <circle class="n" style="--d:2.26s" cx="560" cy="1330" r="6"/>
    <circle class="n" style="--d:2.3s" cx="598" cy="1362" r="5"/><circle class="n" style="--d:2.34s" cx="636" cy="1332" r="5"/>
  </g>
  <text x="500" y="1472" class="cap" text-anchor="middle">"W4GZ" as one continuous narrative, gathering at nodes (community), opening forward and upward (4GZ).</text>

  <!-- FOOTER -->
  <line x1="50" y1="1510" x2="950" y2="1510" stroke="#141414" stroke-opacity=".12"/>
  <text x="50" y="1540" class="cap">Motion is event-driven, not looping: the draw-on + node-bleed reveal plays ONCE on enter/transition (modules re-weave on page change), then holds. Only the weave's node loops (ambient, slow). Pause loops off-screen; disable all under prefers-reduced-motion.</text>
  <text x="50" y="1560" class="cap">New in v2: Narrative (spine), Home, The Fit, Courses, Join. The SYSTEM (line = narrative, node = community, modules = pages, weave = the binding) remains the deliverable.</text>
</svg>
